<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="QXC Serial 超联串口助手 - 专业串口调试工具，支持多编码、指令组、数据导出、RTT调试等功能" />
    <meta name="keywords" content="串口调试,串口助手,Web Serial,Vue,TypeScript,RTT,Modbus" />
    <meta name="author" content="乔鑫超" />
    <!-- 预连接优化 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <!-- 主题色 -->
    <meta name="theme-color" content="#0f172a" />
    <!-- PWA 支持 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>QXC Serial 超联串口助手</title>
    <!-- 内联加载动画样式 -->
    <style>
      /* 初始加载动画 */
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      #app-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #1e293b;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- 加载动画 -->
    <div id="app-loading">
      <div class="loading-spinner"></div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // 移除加载动画
      window.addEventListener('load', () => {
        const loading = document.getElementById('app-loading');
        if (loading) {
          loading.classList.add('fade-out');
          setTimeout(() => loading.remove(), 300);
        }
      });
    </script>
  </body>
</html>
